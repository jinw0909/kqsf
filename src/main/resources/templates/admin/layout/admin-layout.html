<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(title, activeMenu, content, pageCss)">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="_csrf" th:content="${_csrf != null ? _csrf.token : ''}">
  <meta name="_csrf_header" th:content="${_csrf != null ? _csrf.headerName : ''}">

  <title th:text="${title}">KQSF Admin</title>

  <link rel="stylesheet" th:href="@{/admin/bootstrap/css/bootstrap.css}">
  <link rel="stylesheet" th:href="@{/admin/css/admin.css}">

  <link rel="stylesheet"
        th:if="${pageCss != null}"
        th:href="@{${pageCss}}">
</head>
<body>
<div class="admin-layout">
  <div th:replace="~{admin/fragments/sidebar :: sidebar(${activeMenu})}"></div>

  <main class="content">
    <div th:replace="${content}"></div>
  </main>
</div>

<script th:src="@{/admin/bootstrap/js/bootstrap.js}"></script>
<script th:src="@{/admin/js/upload.js}"></script>
</body>
</html>
