<aside class="admin-sidebar" th:fragment="sidebar(activeMenu)">
  <a th:href="@{/admin}" class="admin-sidebar-logo">
    <img th:src="@{/site/images/logo/logo.png}" alt="KQSF">
  </a>

  <div class="admin-sidebar-user">
    admin
  </div>

  <nav class="admin-sidebar-nav">
    <a th:href="@{/admin}"
       th:classappend="${activeMenu == 'dashboard'} ? 'active'">
      대시보드
    </a>

    <a th:href="@{/admin/products}"
       th:classappend="${activeMenu == 'products'} ? 'active'">
      상품 관리
    </a>

    <a th:href="@{/admin/products/categories}"
       th:classappend="${activeMenu == 'categories'} ? 'active'">
      분류 관리
    </a>

    <a th:href="@{/admin/inquiries}"
       th:classappend="${activeMenu == 'inquiries'} ? 'active'">
      문의 관리
    </a>

    <a th:href="@{/admin/technologies}"
       th:classappend="${activeMenu == 'technologies'} ? 'active'">
      기술 관리
    </a>

    <a th:href="@{/}" target="_blank">
      사이트 보기
    </a>
  </nav>

  <div class="admin-sidebar-footer">
    <form th:action="@{/logout}" method="post">
      <button type="submit" class="btn btn-outline-secondary btn-sm">
        로그아웃
      </button>
    </form>
  </div>
</aside>
