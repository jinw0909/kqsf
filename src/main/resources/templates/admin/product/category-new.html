<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>상품 분류 등록</title>
  <link rel="stylesheet" th:href="@{/admin/bootstrap/css/bootstrap.css}">
  <link rel="stylesheet" th:href="@{/admin/css/product/product.css}">
</head>
<body>
<div class="admin-shell">

  <header class="admin-topbar py-3">
    <div class="admin-container py-0 d-flex justify-content-between align-items-center">
      <a th:href="@{/admin}" class="fw-bold">KQSF Admin</a>
      <nav class="d-flex gap-3">
        <a th:href="@{/admin/products}">상품 관리</a>
        <a th:href="@{/admin/products/categories}">분류 관리</a>
      </nav>
    </div>
  </header>

  <main class="admin-container">
    <div class="mb-4">
      <h1 class="admin-page-title">상품 분류 등록</h1>
      <p class="admin-page-subtitle">새 상품 분류를 추가합니다.</p>
    </div>

    <div class="admin-card">
      <div class="admin-card-body">
        <form th:object="${form}" th:action="@{/admin/products/categories}" method="post">
          <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">코드</label>
              <input type="text" th:field="*{code}" class="form-control" placeholder="seafood">
              <div class="admin-form-help mt-1">URL/식별자용 코드. 예: seafood, meat, agriculture</div>
            </div>

            <div class="col-md-6">
              <label class="form-label">정렬 순서</label>
              <input type="number" th:field="*{sortOrder}" class="form-control" placeholder="1">
            </div>

            <div class="col-md-6">
              <label class="form-label">이름</label>
              <input type="text" th:field="*{name}" class="form-control" placeholder="수산물">
            </div>

            <div class="col-md-6">
              <label class="form-label">영문명</label>
              <input type="text" th:field="*{nameEn}" class="form-control" placeholder="Seafood">
            </div>

            <div class="col-12">
              <label class="form-label">설명</label>
              <textarea th:field="*{description}" class="form-control"></textarea>
            </div>

            <div class="col-12">
              <label class="form-label">영문 설명</label>
              <textarea th:field="*{descriptionEn}" class="form-control"></textarea>
            </div>

            <div class="col-12">
              <label class="form-label">썸네일 URL</label>
              <input type="text" th:field="*{thumbnailUrl}" class="form-control" placeholder="https://...">
              <div class="admin-form-help mt-1">S3 업로드 붙이기 전까지는 URL 직접 입력으로 테스트합니다.</div>
            </div>

            <div class="col-12">
              <div class="form-check">
                <input type="checkbox" th:field="*{active}" class="form-check-input">
                <label class="form-check-label">노출</label>
              </div>
            </div>
          </div>

          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary">등록</button>
            <a th:href="@{/admin/products/categories}" class="btn btn-outline-secondary">취소</a>
          </div>
        </form>
      </div>
    </div>
  </main>
</div>

<script th:src="@{/admin/bootstrap/js/bootstrap.js}"></script>
</body>
</html>
