<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="_csrf" th:content="${_csrf != null ? _csrf.token : ''}">
  <meta name="_csrf_header" th:content="${_csrf != null ? _csrf.headerName : ''}">
  <title>상품 분류 수정</title>
  <link rel="stylesheet" th:href="@{/admin/bootstrap/css/bootstrap.css}">
  <link rel="stylesheet" th:href="@{/admin/css/product/product.css}">
</head>
<body>
<div class="admin-shell">

  <header class="admin-topbar py-3">
    <div class="admin-container py-0 d-flex justify-content-between align-items-center">
      <a th:href="@{/admin}" class="fw-bold">KQSF Admin</a>
      <nav class="d-flex gap-3">
        <a th:href="@{/admin/products}">상품 관리</a>
        <a th:href="@{/admin/products/categories}">분류 관리</a>
      </nav>
    </div>
  </header>

  <main class="admin-container">
    <div class="mb-4">
      <h1 class="admin-page-title">상품 분류 수정</h1>
      <p class="admin-page-subtitle">상품 분류 정보를 수정합니다.</p>
    </div>

    <div class="admin-card">
      <div class="admin-card-body">
        <form th:object="${form}"
              th:action="@{/admin/products/categories/{id}/edit(id=${categoryId})}"
              method="post">
          <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">코드</label>
              <input type="text" th:field="*{code}" class="form-control">
            </div>

            <div class="col-md-6">
              <label class="form-label">정렬 순서</label>
              <input type="number" th:field="*{sortOrder}" class="form-control">
            </div>

            <div class="col-md-6">
              <label class="form-label">이름</label>
              <input type="text" th:field="*{name}" class="form-control">
            </div>

            <div class="col-md-6">
              <label class="form-label">영문명</label>
              <input type="text" th:field="*{nameEn}" class="form-control">
            </div>

            <div class="col-12">
              <label class="form-label">설명</label>
              <textarea th:field="*{description}" class="form-control"></textarea>
            </div>

            <div class="col-12">
              <label class="form-label">영문 설명</label>
              <textarea th:field="*{descriptionEn}" class="form-control"></textarea>
            </div>

            <div class="col-12">
              <label class="form-label">배너 이미지</label>

              <div class="image-uploader"
                   data-upload-dir="products/category/banner"
                   data-input-id="bannerUrl"
                   data-file-id="bannerFile"
                   data-preview-id="bannerPreview"
                   data-placeholder-id="bannerPlaceholder"
                   data-reset-id="bannerReset">

                <input type="hidden"
                       th:field="*{bannerUrl}"
                       id="bannerUrl"
                       th:attr="data-original-value=*{bannerUrl}">

                <input type="file"
                       id="bannerFile"
                       class="image-uploader__file"
                       accept="image/*">

                <div class="image-uploader__dropzone">
                  <img id="bannerPreview"
                       class="image-uploader__preview"
                       th:if="*{bannerUrl != null and !#strings.isEmpty(bannerUrl)}"
                       th:src="*{bannerUrl}"
                       alt="category banner preview">

                  <img id="bannerPreview"
                       class="image-uploader__preview d-none"
                       th:unless="*{bannerUrl != null and !#strings.isEmpty(bannerUrl)}"
                       alt="category banner preview">

                  <div id="bannerPlaceholder"
                       class="image-uploader__placeholder"
                       th:classappend="*{bannerUrl != null and !#strings.isEmpty(bannerUrl)} ? ' d-none'">
                    <div class="image-uploader__icon">＋</div>
                    <div class="image-uploader__text">배너 이미지를 클릭하거나 드래그해서 업로드</div>
                    <div class="image-uploader__hint">JPG, PNG, WEBP / 최대 20MB</div>
                  </div>

                  <div class="image-uploader__loading d-none">
                    업로드 중...
                  </div>
                </div>

                <div class="image-uploader__actions">
                  <button type="button"
                          class="btn btn-sm btn-outline-secondary image-uploader__reset"
                          id="bannerReset">
                    리셋
                  </button>
                </div>
              </div>
            </div>

            <div class="col-12">
              <div class="form-check">
                <input type="checkbox" th:field="*{active}" class="form-check-input">
                <label class="form-check-label">노출</label>
              </div>
            </div>
          </div>

          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary">수정 저장</button>
            <a th:href="@{/admin/products/categories}" class="btn btn-outline-secondary">취소</a>
          </div>
        </form>
      </div>
    </div>
  </main>
</div>

<script th:src="@{/admin/bootstrap/js/bootstrap.js}"></script>
<script th:src="@{/admin/js/upload.js}"></script>
</body>
</html>
