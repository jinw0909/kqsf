<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>KQSF Admin Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Noto Sans KR", sans-serif;
      background: #0b0f14;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .login-page {
      width: 100%;
      max-width: 420px;
    }

    .logo {
      display: block;
      margin-bottom: 28px;
      text-align: center;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 0.12em;
    }

    .login-card {
      padding: 36px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }

    .eyebrow {
      margin: 0 0 12px;
      color: #8fd3ff;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      letter-spacing: -0.04em;
    }

    .description {
      margin: 0 0 28px;
      color: rgba(255, 255, 255, 0.62);
      font-size: 14px;
      line-height: 1.6;
    }

    .alert {
      margin-bottom: 18px;
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 13px;
      line-height: 1.5;
    }

    .alert.error {
      color: #ffd1d1;
      background: rgba(255, 80, 80, 0.12);
      border: 1px solid rgba(255, 80, 80, 0.24);
    }

    .alert.logout {
      color: #c7f7df;
      background: rgba(80, 255, 160, 0.1);
      border: 1px solid rgba(80, 255, 160, 0.2);
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: rgba(255, 255, 255, 0.78);
      font-size: 13px;
      font-weight: 700;
    }

    input {
      width: 100%;
      height: 48px;
      padding: 0 14px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      font-size: 15px;
      outline: none;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.35);
    }

    input:focus {
      border-color: rgba(143, 211, 255, 0.8);
      box-shadow: 0 0 0 4px rgba(143, 211, 255, 0.12);
    }

    button {
      width: 100%;
      height: 50px;
      margin-top: 8px;
      border: 0;
      border-radius: 999px;
      background: #ffffff;
      color: #0b0f14;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.92;
    }

    .back-link {
      display: block;
      margin-top: 20px;
      text-align: center;
      color: rgba(255, 255, 255, 0.52);
      font-size: 13px;
    }

    .back-link:hover {
      color: #ffffff;
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 28px 22px;
        border-radius: 22px;
      }

      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
<main class="login-page">
  <a href="/" class="logo">KQSF</a>

  <section class="login-card">
    <p class="eyebrow">Admin</p>
    <h1>관리자 로그인</h1>
    <p class="description">
      KQSF 관리자 페이지에 접근하려면 로그인해주세요.
    </p>

    <div class="alert error" th:if="${param.error}">
      아이디 또는 비밀번호가 올바르지 않습니다.
    </div>

    <div class="alert logout" th:if="${param.logout}">
      로그아웃되었습니다.
    </div>

    <form th:action="@{/login}" method="post">
      <input type="hidden"
             th:name="${_csrf.parameterName}"
             th:value="${_csrf.token}">

      <div class="form-group">
        <label for="username">아이디</label>
        <input id="username"
               type="text"
               name="username"
               placeholder="아이디를 입력하세요"
               autocomplete="username"
               required
               autofocus>
      </div>

      <div class="form-group">
        <label for="password">비밀번호</label>
        <input id="password"
               type="password"
               name="password"
               placeholder="비밀번호를 입력하세요"
               autocomplete="current-password"
               required>
      </div>

      <button type="submit">로그인</button>
    </form>
  </section>

  <a href="/" class="back-link">메인으로 돌아가기</a>
</main>
</body>
</html>
